{% extends 'base.html' %}
{% block title %}Ro'yxatdan o'tish{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-sm">
    <h2 class="text-2xl font-bold text-center mb-6">Ro'yxatdan o'tish</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">To'liq ism</label>
            <input type="text" name="full_name" required class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Telefon raqami</label>
            <input type="tel" name="phone_number" placeholder="+998XXXXXXXXX" required class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-1">Parol</label>
            <input type="password" name="password" required class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 font-medium">
            Ro'yxatdan o'tish
        </button>
    </form>
    <p class="text-center mt-4 text-gray-600">
        Hisobingiz bormi? <a href="{% url 'login' %}" class="text-blue-600 hover:underline">Kirish</a>
    </p>
</div>
{% endblock %}
