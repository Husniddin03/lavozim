<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Lavozim O'quv Platformasi{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="{% url 'home' %}" class="text-xl font-bold text-blue-600">🎓 Lavozim</a>
            <div class="flex gap-4">
                {% if user.is_authenticated %}
                    <a href="{% url 'profile' %}" class="text-gray-600 hover:text-blue-600">Profil</a>
                    <a href="{% url 'logout' %}" class="text-gray-600 hover:text-red-600">Chiqish</a>
                {% else %}
                    <a href="{% url 'login' %}" class="text-gray-600 hover:text-blue-600">Kirish</a>
                    <a href="{% url 'register' %}" class="bg-blue-600 text-white px-4 py-2 rounded-lg">Ro'yxatdan o'tish</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 p-4 rounded-lg {% if message.tags == 'success' %}bg-green-100 text-green-700{% elif message.tags == 'error' %}bg-red-100 text-red-700{% else %}bg-blue-100 text-blue-700{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <footer class="bg-gray-800 text-white text-center py-4 mt-auto">
        <p>&copy; 2026 Lavozim O'quv Platformasi. Mebel City uchun.</p>
    </footer>
</body>
</html>
